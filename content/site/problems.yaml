    order: 4
    sections:
      - heading: PCI scope and network architecture
        body: Cardholder data environment boundaries, network segmentation, and store-level security controls all affect PCI assessment scope and remediation cost.
      - heading: Common gaps
        body: Flat store networks, unmanaged guest Wi-Fi, outdated firewall policies, and inconsistent patching across locations are recurring findings.

