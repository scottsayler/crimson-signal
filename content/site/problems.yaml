    ctaLabel: Calculate POTS savings
    ctaHref: /tools/pots-savings-calculator
    order: 5
    sections:
      - heading: The copper sunset
        body: Carriers are actively retiring copper infrastructure. Organizations maintaining analog lines for alarms, fax, credit card dial backup, and elevators face escalating per-line costs.
      - heading: Inventory first
        body: Most organizations underestimate how many POTS lines remain across their footprint. A complete location-by-location inventory is the essential first step.

