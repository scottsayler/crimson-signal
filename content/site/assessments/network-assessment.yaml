id: network-assessment
toolSlug: network-assessment
title: Network Readiness Assessment
scoreLabel: Network readiness score
resultsDisclaimer: Scores are directional and based on your selections in this session.

choiceSets:
  maturity:
    - label: Not in place or unknown across most locations
      score: 0
    - label: Ad hoc with wide variation by store or franchisee
      score: 1
    - label: Partially implemented at some locations
      score: 2
    - label: Documented standard with periodic testing
      score: 3
    - label: Portfolio-wide standard with accountable ownership
      score: 4

categories:
  - id: connectivity-reliability
    label: Connectivity & Reliability
    description: Primary circuit quality, consistency, and uptime across your restaurant portfolio.
    weight: 1
  - id: backup-resilience
    label: Backup & Resilience
    description: Failover paths, backup internet, and tested recovery during peak service.
    weight: 1
  - id: network-visibility
    label: Network Visibility
    description: Remote monitoring, outage detection, and historical performance data by location.
    weight: 1
  - id: standardization
    label: Standardization
    description: Documented network standards, hardware consistency, and configuration governance.
    weight: 1
  - id: security
    label: Security
    description: Traffic segmentation, firewall policy, PCI scope, and guest Wi-Fi isolation.
    weight: 1
  - id: store-operations
    label: Store Operations
    description: Alert routing, first-response ownership, and operational impact when circuits fail.
    weight: 1
  - id: documentation
    label: Documentation
    description: Circuit inventory, contract visibility, POTS records, and alarm connectivity documentation.
    weight: 1
  - id: vendor-management
    label: Vendor Management
    description: Carrier relationships, procurement governance, and telecom spend control.
    weight: 1
  - id: growth-readiness
    label: Growth Readiness
    description: Opening standards, franchise alignment, configuration at scale, and legacy line retirement.
    weight: 1

relatedContent:
  networking:
    title: Restaurant Networking
    href: /industries/restaurants/networking
    description: Store architecture, failover, and standardization before new technology purchases.
  bestInternet:
    title: Best Internet for Restaurants
    href: /industries/restaurants/best-internet
    description: Circuit selection, redundancy, and what to order for new locations.
  managedNetwork:
    title: Managed Network
    href: /industries/restaurants/managed-network
