questions:
  - id: conn-rel-1
    category: connectivity-reliability
    prompt: How consistent are primary circuit type, speed, and SLA across your portfolio?
    choiceSet: maturity
  - id: conn-rel-2
    category: connectivity-reliability
    prompt: What happens to POS and card processing when the primary circuit drops during peak service?
    choiceSet: maturity
  - id: conn-rel-3
    category: connectivity-reliability
    prompt: How do you evaluate and approve internet options for new restaurant openings?
    choiceSet: maturity

  - id: backup-1
    category: backup-resilience
    prompt: How many locations have a tested backup internet path when the primary ISP fails?
    choiceSet: maturity
  - id: backup-2
    category: backup-resilience
    prompt: When did you last test automated failover during lunch, dinner, or drive-thru rush?
    choiceSet: maturity
  - id: backup-3
    category: backup-resilience
    prompt: Do critical store services have a defined failover path when connectivity fails?
    choiceSet: maturity

  - id: vis-1
    category: network-visibility
    prompt: Can your team see WAN or circuit status remotely for every operating location?
    choiceSet: maturity
  - id: vis-2
    category: network-visibility
    prompt: What is the typical time to detect a POS-affecting outage at a store?
    choiceSet: maturity
  - id: vis-3
    category: network-visibility
    prompt: Do you maintain historical outage data by location to spot repeat failures?
    choiceSet: maturity

  - id: std-1
    category: standardization
    prompt: Do you have a documented network standard that every new opening must follow?
    choiceSet: maturity
  - id: std-2
    category: standardization
    prompt: How many unique router, firewall, or CPE models are deployed in the field?
    choiceSet: maturity
  - id: std-3
    category: standardization
    prompt: How often is the store network standard reviewed and updated?
    choiceSet: maturity

  - id: sec-1
    category: security
    prompt: Is POS and payment traffic on a separate VLAN or segment from guest Wi-Fi?
    choiceSet: maturity
  - id: sec-2
    category: security
    prompt: How consistent are firewall rules and security policy across locations?
    choiceSet: maturity
  - id: sec-3
    category: security
    prompt: How is PCI scope managed across store networks and remote access paths?
    choiceSet: maturity

  - id: ops-1
    category: store-operations
    prompt: How are store connectivity alerts routed, acknowledged, and escalated?
    choiceSet: maturity
  - id: ops-2
    category: store-operations
    prompt: Who owns day-to-day network monitoring and first-response troubleshooting?
    choiceSet: maturity
  - id: ops-3
    category: store-operations
    prompt: How do store voice and ordering systems behave during a WAN or ISP outage?
    choiceSet: maturity

  - id: doc-1
    category: documentation
    prompt: How visible are circuit contracts, renewal dates, and monthly spend by location?
    choiceSet: maturity
  - id: doc-2
    category: documentation
    prompt: How accurate is your inventory of analog POTS lines across locations?
    choiceSet: maturity
  - id: doc-3
    category: documentation
    prompt: How are fire, burglar, and elevator alarm panels connected and documented at each store?
    choiceSet: maturity

  - id: ven-1
    category: vendor-management
    prompt: How many distinct ISP or carrier relationships support your restaurant footprint?
    choiceSet: maturity
  - id: ven-2
    category: vendor-management
    prompt: What process exists to consolidate vendors or standardize procurement?
    choiceSet: maturity
  - id: ven-3
    category: vendor-management
    prompt: Who approves new telecom or network spend at the store level?
    choiceSet: maturity

  - id: growth-1
    category: growth-readiness
    prompt: How are franchisee or operator deviations from corporate network standards handled?
    choiceSet: maturity
  - id: growth-2
    category: growth-readiness
    prompt: How are configurations deployed and updated across stores at scale?
    choiceSet: maturity
  - id: growth-3
    category: growth-readiness
    prompt: Do you have a documented plan to retire legacy copper lines portfolio-wide?
    choiceSet: maturity

resultProfiles:
  - minScore: 86
    level: Optimized
    summary: Network operations are standardized, monitored, and tested across the portfolio. Focus on continuous improvement, cost optimization, and validating outlier locations.
  - minScore: 71
    level: Standardized
    summary: Strong fundamentals and documented standards are in place. Close remaining gaps at outlier stores before accelerating openings or acquisitions.
  - minScore: 51
    level: Operational
    summary: Core practices exist but consistency breaks down across locations. Prioritize backup testing, visibility, and traffic separation at high-volume stores.
  - minScore: 31
    level: Foundational
    summary: Capabilities are uneven and often reactive. Documented standards, backup connectivity, and monitoring should come before major architecture projects.
  - minScore: 0
    level: Reactive
    summary: Network operations lack portfolio-wide consistency. Start with store inventory, failover testing, and circuit documentation before evaluating new technology.

recommendations:
