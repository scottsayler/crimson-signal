- slug: internet-outages
  title: Internet Outages
  description: What restaurant and multi-location operators should do about store internet outages, from immediate failover options to long-term resilience planning.

  contentType: problem
  businessProblem: internet-outages
  industry: restaurants
  persona: [operations, it-director, store-operations, cfo]
  primaryKeyword: restaurant internet outage
  secondaryKeywords:
    - store internet outage
    - internet failover restaurants
    - store connectivity downtime
  searchIntent: decision-support
  buyerStage: awareness
  publish: false
  order: 1

  relatedEntities:
    - /industries/restaurants
    - /industries/restaurants/networking
    - /industries/restaurants/best-internet
    - /technologies/lte-5g-backup
    - /technologies/sd-wan
    - /tools/downtime-cost-calculator

  cta:
    label: Calculate outage cost
    href: /tools/downtime-cost-calculator

  decisionGuide:
    quickAnswer: |
      A store internet outage stops card payments, kitchen routing, and online orders within minutes. Most locations still run on a single circuit with no tested backup. Start with LTE failover at high-volume stores.

    whyYoureHere: |
      The registers went down again. Guests could not pay by card. Leadership asked what it cost and what to fix first.

    shouldConsider:
      evaluateIf:
        - Outages occur during lunch or dinner service
        - Locations run on a single ISP with no automated failover
        - Finance needs outage cost data to approve resilience spending
      probablyNotIf:
        - Outages are rare and always happen when the store is closed
        - You already have diverse carriers and quarterly failover testing

    whatProblemSolves: |
      Treating outages as a business problem changes priorities. Revenue stops, guest experience drops, and resilience spending gets justified with numbers.

    realityCheck: |
      ISP outage credits do not cover real business loss during peak service.

    alternatives:
      - title: LTE or 5G backup
        description: Fastest path to keeping POS alive.
      - title: Second ISP with diverse path
        description: Strong option when two carriers are available.

    questionsToAsk:
      - How many outage hours did we log last year by location?
      - Which stores have no backup circuit today?
      - When did we last test failover during rush volume?

    decisionMatrix:
      - situation: Single outage at one store
        recommendation: Fix that site with LTE backup
      - situation: Portfolio-wide single-circuit stores
        recommendation: Tiered rollout starting with top revenue locations

    worthKnowing: |
      Outages during the first 30 minutes of lunch cost more per minute than mid-afternoon lulls.

    askBeforeYouBuy:
      - What is documented hourly downtime cost at affected locations?
      - Does backup internet carry POS traffic automatically?

    bottomLine: |
      Document outage history, quantify cost, add backup at high-volume stores, then standardize for new openings.

    faqs:
      - question: What causes restaurant internet outages?
        answer: ISP failures, construction damage, weather, misconfigured routers, and overloaded circuits during peak hours.
      - question: What should we fix first?
        answer: Backup internet and monitoring at highest-revenue locations.
      - question: Is LTE backup enough?
        answer: For many locations, yes, if sized for POS and tested during peak hours.
      - question: When is SD-WAN the right response?
        answer: When you operate many locations with mixed WAN setups and need centralized failover policy.
