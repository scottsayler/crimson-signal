sections:
  - heading: Opening day dependencies
    body: POS, payment processing, kitchen systems, guest Wi-Fi, security cameras, and voice lines must all be live before the first customer. Network provisioning is on the critical path.
  - heading: Common failures
    body: Late circuit delivery, incorrect CPE configuration, missing firewall rules for PCI scope, and franchisee/vendor coordination gaps cause opening delays.
  - heading: Standardization opportunity
    body: Repeatable opening playbooks, pre-approved vendor lists, and template network designs reduce variance and accelerate time to revenue.
