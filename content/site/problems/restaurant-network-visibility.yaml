  evidence:
    - title: Visibility has to cover the full stack
      finding: Public restaurant examples show that operators may have visibility into one layer, such as SD-WAN, while still missing failures in switches, Wi-Fi, or local infrastructure.
      whyItMatters: A restaurant can still experience revenue-impacting outages if visibility stops at the WAN edge.
      source: Restaurant Network Visibility research packet
    - title: Earlier detection reduces operational impact
      finding: Public outage-detection examples show that earlier visibility can identify problems before they become visible service interruptions.
      whyItMatters: Faster detection gives restaurants more time to act before guests, staff, or revenue are affected.
      source: Restaurant Network Visibility research packet
    - title: Fragmented tools create fragmented response
      finding: Separate ISP portals, Wi-Fi tools, POS tickets, and vendor dashboards make it harder to identify what failed first.
      whyItMatters: Restaurant operators need shared visibility to reduce finger-pointing and shorten recovery time.
      source: Restaurant Network Visibility research packet
