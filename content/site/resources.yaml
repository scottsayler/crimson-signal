  - slug: vendor-evaluation-template
    title: Vendor Evaluation Template
    description: Structured template for evaluating telecom and managed network vendors for multi-location deployments.
    contentType: checklist
    persona: [procurement, it-director, cio]
    primaryKeyword: telecom vendor evaluation template
    secondaryKeywords:
      - managed network vendor rfp
      - wan vendor selection criteria
    buyerStage: evaluation
    relatedPages:
      - /problems/vendor-sprawl
      - /tools/vendor-consolidation-calculator
      - /technologies/managed-network
    order: 3
    sections:
      - heading: Evaluation criteria
        body: |
          - [ ] Multi-location deployment experience documented
          - [ ] SLA terms defined with financial penalties
          - [ ] Provisioning timeline commitments by location type
          - [ ] Monitoring and NOC capabilities described
          - [ ] Security and compliance certifications verified
          - [ ] Reference customers in your industry contacted
          - [ ] Total cost of ownership model including hidden fees
          - [ ] Contract exit and migration terms reviewed
